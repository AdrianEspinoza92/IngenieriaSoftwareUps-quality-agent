server:
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:h2:mem:citasaludtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data-test.sql
      mode: always

logging:
  level:
    org.citasalud: DEBUG
    org.springframework.jdbc: DEBUG
    root: INFO
